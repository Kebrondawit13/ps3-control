<!DOCTYPE html>
<html>
<head>
<title>PS3 Control</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card {
  background:#1c1c1c;
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 20px #000;
  text-align:center;
}

button {
  padding:15px 25px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

.off { background:red; color:white; }
.off:hover { background:darkred; }

.restart { background:orange; color:black; }
.restart:hover { background:#cc8400; }
</style>
</head>

<body>

<div class="card">
  <h1>🎮 PS3 Control Center</h1>

  <button class="off" onclick="shutdown()">Turn OFF</button>
  <button class="restart" onclick="restart()">Restart</button>
</div>

<script>
function shutdown(){
  fetch("http://10.0.0.80/shutdown.ps3");
}

function restart(){
  fetch("http://10.0.0.80/restart.ps3");
}
</script>

</body>
</html>
